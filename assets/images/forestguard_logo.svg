<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Transparent outer bounding shield with thick gradient outline -->
    <path d="M256 16L48 80V224C48 376 144 472 256 496C368 472 464 376 464 224V80L256 16Z" fill="url(#shieldFillGrad)" stroke="url(#shieldBorderGrad)" stroke-width="24" stroke-linejoin="round"/>
    
    <!-- Outer shield double border/inner line for high-tech premium effect -->
    <path d="M256 36L72 96V224C72 356 156 440 256 464C356 440 440 356 440 224V96L256 36Z" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4"/>

    <!-- Bi-tone Pine Tree -->
    <!-- Left side: Bright lime green shadow/lighting -->
    <path d="M256 128L176 240H208L144 336H184L128 432H256V128Z" fill="#7ac62e"/>
    
    <!-- Right side: Deep forest green shadow -->
    <path d="M256 128L336 240H304L368 336H328L384 432H256V128Z" fill="#4d7e26"/>
    
    <!-- Flame base trunk connector -->
    <rect x="244" y="420" width="24" height="20" fill="#2d1c0b"/>

    <!-- Fire Flame at the base -->
    <!-- Outer flame (Orange-Red Gradient) -->
    <path d="M256 312C284.8 344 312 376 312 416C312 448 284.8 464 256 464C227.2 464 200 448 200 416C200 376 227.2 344 256 312Z" fill="url(#flameOuterGrad)"/>
    
    <!-- Inner flame (Yellow-Orange Gradient) -->
    <path d="M256 360C272 380 288 396 288 424C288 440 272 452 256 452C240 452 224 440 224 424C224 396 240 380 256 360Z" fill="url(#flameInnerGrad)"/>

    <!-- Gradient definitions -->
    <defs>
        <!-- Shield Background Gradient: deep forest black green -->
        <linearGradient id="shieldFillGrad" x1="256" y1="16" x2="256" y2="496" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0a1408" stop-opacity="0.95"/>
            <stop offset="1" stop-color="#12250d" stop-opacity="0.95"/>
        </linearGradient>
        
        <!-- Shield Border Gradient: bright lime green gradient -->
        <linearGradient id="shieldBorderGrad" x1="256" y1="16" x2="256" y2="496" gradientUnits="userSpaceOnUse">
            <stop stop-color="#84cf32"/>
            <stop offset="1" stop-color="#558f20"/>
        </linearGradient>
        
        <!-- Flame Outer Gradient -->
        <linearGradient id="flameOuterGrad" x1="256" y1="312" x2="256" y2="464" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ff4d15"/>
            <stop offset="1" stop-color="#ff8c1a"/>
        </linearGradient>
        
        <!-- Flame Inner Gradient -->
        <linearGradient id="flameInnerGrad" x1="256" y1="360" x2="256" y2="452" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ffeb3b"/>
            <stop offset="1" stop-color="#ff9800"/>
        </linearGradient>
    </defs>
</svg>
